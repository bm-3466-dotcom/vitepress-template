    // PBKDF2 configuration (must match Python script)
    const SALT = CryptoJS.enc.Utf8.parse('cp125_marks_2024');
    const ITERATIONS = 100000;
    const KEY_SIZE = 256 / 32; // 32 bytes for AES-256

    function sha256Hash(text) {
      return CryptoJS.SHA256(text).toString();
    }

    function deriveKey(password) {
      return CryptoJS.PBKDF2(password, SALT, {
        keySize: KEY_SIZE,
        iterations: ITERATIONS,
        hasher: CryptoJS.algo.SHA256
      });
    }

    function decryptData(encryptedBase64, password) {
      try {
        // Decode base64
        const encryptedBytes = CryptoJS.enc.Base64.parse(encryptedBase64);

        // Extract IV (first 16 bytes = 4 words) and ciphertext
        const ivWordArray = CryptoJS.lib.WordArray.create(encryptedBytes.words.slice(0, 4), 16);
        const ciphertextWordArray = CryptoJS.lib.WordArray.create(encryptedBytes.words.slice(4), encryptedBytes.sigBytes - 16);

        // Derive key from password
        const key = deriveKey(password);

        // Decrypt using AES-CBC
        const decrypted = CryptoJS.AES.decrypt(
          { ciphertext: ciphertextWordArray },
          key,
          {
            iv: ivWordArray,
            mode: CryptoJS.mode.CBC,
            padding: CryptoJS.pad.Pkcs7
          }
        );

        // Convert to UTF-8 string
        const result = decrypted.toString(CryptoJS.enc.Utf8);
        if (!result) {
          return null;
        }
        return result;
      } catch (e) {
        console.error('Failed:', e);
        return null;
      }
    }

    function displayError(message) {
      document.getElementById('result').innerHTML = `<div class="error">${message}</div>`;
    }

    function displayMarks(marksData) {
      const html = `
        <div class="marks-display">
          <h2>${marksData.name}</h2>
          <div class="marks-row">
            <span class="marks-label">Matric Number:</span>
            <span class="marks-value">${marksData.matric}</span>
          </div>
          <div class="marks-row">
            <span class="marks-label">Class:</span>
            <span class="marks-value">${marksData.class}</span>
          </div>
          <div class="marks-row">
            <span class="marks-label">Lab Test 1 (10%):</span>
            <span class="marks-value">${marksData.lt1} / 20</span>
          </div>
          <div class="marks-row">
            <span class="marks-label">Lab Test 2 (10%):</span>
            <span class="marks-value">${marksData.lt2} / 20</span>
          </div>
          <div class="marks-row">
            <span class="marks-label">Lab Test 3 (15%):</span>
            <span class="marks-value">${marksData.lt3} / 20</span>
          </div>
          <div class="marks-row">
            <span class="marks-label">Assignment (15%):</span>
            <span class="marks-value">${marksData.assignment} / 24</span>
          </div>
          <div class="marks-row">
            <span class="marks-label">Total Raw:</span>
            <span class="marks-value">${marksData.total_raw} / 84</span>
          </div>
          <div class="marks-row total-row">
            <span class="marks-label">Total Percentage:</span>
            <span class="marks-value">${marksData.total_percent} / 50</span>
          </div>
        </div>
      `;
      document.getElementById('result').innerHTML = html;
    }

    function checkMarks() {
      const matricInput = document.getElementById('matric-input').value.trim();

      if (!matricInput) {
        displayError('Please enter your matric number.');
        return;
      }

      // Hash the matric number to find the record
      const matricHash = sha256Hash(matricInput);

      // Find matching record
      const record = encryptedData.records.find(r => r.id === matricHash);

      if (!record) {
        displayError('Invalid matric number. Please check and try again.');
        return;
      }

      // Decrypt the data
      const decryptedJson = decryptData(record.data, matricInput);

      if (!decryptedJson) {
        displayError('Decryption failed. Invalid matric number.');
        return;
      }

      // Parse JSON
      let marksData;
      try {
        marksData = JSON.parse(decryptedJson);
      } catch (e) {
        displayError('Invalid data format. Please contact your lecturer.');
        return;
      }

      // Verify hash
      const dataHash = sha256Hash(decryptedJson);
      if (dataHash !== record.hash) {
        displayError('Data verification failed. Invalid matric number.');
        return;
      }

      // Display marks
      displayMarks(marksData);
    }

    // Event listeners
    document.getElementById('check-btn').addEventListener('click', checkMarks);
    document.getElementById('matric-input').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        checkMarks();
      }
    });
